name: Daily Crawl & Translate

on:
  schedule:
    # 매일 한국시간 오전 8시 (UTC 23:00 = KST 08:00)
    - cron: "0 23 * * *"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    concurrency:
      group: crawl-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run crawler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_DAILY: ${{ vars.MODEL_DAILY || 'claude-haiku-4-5-20251001' }}
          MAX_ITEMS_PER_SOURCE: "5"
        run: python scripts/crawl_and_translate.py

      - name: Commit changes
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "data: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
