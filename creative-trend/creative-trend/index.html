<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creative Trend — AI·디자인·영상 업데이트 데일리</title>
<meta name="description" content="AI 영상·이미지 생성, 디자인 툴, 영상 편집 플랫폼의 신기능과 기술 업데이트를 한국어로 매일 정리">
<link rel="alternate" type="application/rss+xml" title="Creative Trend RSS" href="./feed.xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,500&family=Pretendard+Variable:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #f6f3ec;
    --bg-elev: #ffffff;
    --ink: #1b1a17;
    --ink-soft: #4a4842;
    --ink-mute: #8a8680;
    --line: #e3ddd1;
    --accent: #d94a2b;
    --accent-soft: #fce9e2;
    --tag-image_video: #d94a2b;
    --tag-design_tool: #5145e5;
    --tag-ai_platform: #0a8a5c;
    --tag-video_motion: #c77700;
    --tag-audio: #1d73c9;
    --tag-misc: #6b655c;

    --serif: "Fraunces", "Noto Serif KR", Georgia, serif;
    --sans: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  [data-theme="dark"] {
    --bg: #14120f;
    --bg-elev: #1c1a15;
    --ink: #f2ece0;
    --ink-soft: #c6bfae;
    --ink-mute: #7e7868;
    --line: #2d2a22;
    --accent: #f1704f;
    --accent-soft: #3a1d16;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ───────── Header ───────── */
  .masthead {
    padding: 36px 32px 24px;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .masthead-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 24px; max-width: 1320px; margin: 0 auto;
  }
  .logo {
    font-family: var(--serif);
    font-weight: 800;
    font-size: clamp(36px, 5vw, 56px);
    line-height: 0.95;
    letter-spacing: -0.02em;
  }
  .logo em {
    font-style: italic;
    font-weight: 500;
    color: var(--accent);
  }
  .tagline {
    color: var(--ink-mute);
    font-size: 13px;
    margin-top: 8px;
    max-width: 520px;
  }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .header-btn {
    width: 40px; height: 40px;
    border: 1px solid var(--line);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .15s;
    background: var(--bg-elev);
  }
  .header-btn:hover { border-color: var(--ink); }

  /* ───────── Tabs (기간) ───────── */
  .tabs {
    display: flex; gap: 0; align-items: flex-end;
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .tabs-inner {
    display: flex; gap: 2px; max-width: 1320px; margin: 0 auto; width: 100%;
  }
  .tab {
    padding: 14px 22px 12px;
    font-family: var(--serif);
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-mute);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .15s;
    position: relative;
  }
  .tab:hover { color: var(--ink); }
  .tab[aria-selected="true"] {
    color: var(--ink);
    border-bottom-color: var(--accent);
  }
  .tab .count {
    display: inline-block;
    margin-left: 6px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mute);
    background: var(--line);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .tab[aria-selected="true"] .count {
    background: var(--accent);
    color: #fff;
  }

  /* ───────── Main container ───────── */
  main {
    max-width: 1320px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ───────── Today headline ───────── */
  .headline {
    margin-bottom: 36px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .headline-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .headline-eyebrow::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .4; transform: scale(.8); }
  }
  .headline-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(22px, 3vw, 30px);
    line-height: 1.25;
    letter-spacing: -0.01em;
    max-width: 960px;
    margin: 0 0 20px;
  }
  .insight-list {
    list-style: none; padding: 0; margin: 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px 32px;
  }
  .insight-list li {
    font-size: 14px;
    color: var(--ink-soft);
    padding-left: 22px;
    position: relative;
    line-height: 1.55;
  }
  .insight-list li::before {
    content: "―";
    position: absolute;
    left: 0; top: 0;
    color: var(--accent);
    font-weight: 700;
  }

  /* ───────── Filter bar ───────── */
  .filters {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .chip {
    padding: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink-soft);
    transition: all .15s;
    background: var(--bg-elev);
  }
  .chip:hover { border-color: var(--ink-soft); color: var(--ink); }
  .chip[aria-pressed="true"] {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .filter-sep {
    width: 1px; height: 16px;
    background: var(--line);
    margin: 0 8px;
  }

  /* ───────── Cards grid ───────── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
  }
  .card {
    background: var(--bg-elev);
    padding: 22px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    transition: transform .15s;
    min-height: 200px;
  }
  .card:hover {
    background: var(--bg);
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 11px;
    font-family: var(--mono);
    letter-spacing: 0.03em;
  }
  .card-source {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink-mute);
    text-transform: uppercase;
  }
  .card-source .emoji {
    font-size: 14px;
  }
  .card-tag {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    background: var(--accent-soft);
    color: var(--accent);
  }
  .card h3 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    line-height: 1.3;
    letter-spacing: -0.005em;
    margin: 0;
    color: var(--ink);
  }
  .card h3 a:hover { color: var(--accent); }
  .card-summary {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.55;
    margin: 0;
  }
  .card-orig {
    font-size: 11.5px;
    color: var(--ink-mute);
    font-style: italic;
    border-left: 2px solid var(--line);
    padding-left: 10px;
    margin: 0;
  }
  .card-tip {
    font-size: 12.5px;
    color: var(--ink);
    background: var(--accent-soft);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: var(--mono);
    line-height: 1.5;
  }
  [data-theme="dark"] .card-tip { color: var(--ink); }
  .card-bottom {
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--line);
    display: flex; justify-content: space-between;
    font-size: 11px;
    color: var(--ink-mute);
    font-family: var(--mono);
  }
  .card-bottom a:hover { color: var(--accent); text-decoration: underline; }

  /* 카테고리별 컬러 바 (카드 왼쪽) */
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat, var(--line));
  }
  .card[data-cat="image_video"]  { --cat: var(--tag-image_video); }
  .card[data-cat="design_tool"]  { --cat: var(--tag-design_tool); }
  .card[data-cat="ai_platform"]  { --cat: var(--tag-ai_platform); }
  .card[data-cat="video_motion"] { --cat: var(--tag-video_motion); }
  .card[data-cat="audio"]        { --cat: var(--tag-audio); }

  /* ───────── Empty state ───────── */
  .empty {
    padding: 80px 20px;
    text-align: center;
    color: var(--ink-mute);
  }
  .empty h2 {
    font-family: var(--serif);
    font-weight: 500;
    font-style: italic;
    font-size: 28px;
    margin: 0 0 8px;
    color: var(--ink-soft);
  }

  /* ───────── Weekly / Monthly views ───────── */
  .report {
    padding: 32px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .report-meta {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    margin-bottom: 14px;
  }
  .report-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(24px, 3.2vw, 34px);
    line-height: 1.2;
    margin: 0 0 18px;
  }
  .report-summary {
    font-size: 15.5px;
    color: var(--ink-soft);
    line-height: 1.7;
    margin-bottom: 24px;
    max-width: 820px;
  }
  .report-section { margin-top: 32px; }
  .report-section h3 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    margin: 0 0 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .cat-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--d, var(--ink));
  }

  /* ───────── Footer ───────── */
  footer {
    padding: 40px 32px 60px;
    text-align: center;
    color: var(--ink-mute);
    font-size: 12px;
    border-top: 1px solid var(--line);
    margin-top: 60px;
  }

  /* 태블릿 아래로 */
  @media (max-width: 720px) {
    .masthead { padding: 24px 20px 18px; }
    .tabs { padding: 0 20px; overflow-x: auto; }
    .tab { padding: 12px 14px 10px; white-space: nowrap; font-size: 14px; }
    main { padding: 24px 20px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <div>
      <h1 class="logo">Creative <em>Trend</em></h1>
      <p class="tagline">AI 영상·이미지·디자인·편집 툴의 신기능과 업데이트를 매일 한국어로.</p>
    </div>
    <div class="header-actions">
      <a class="header-btn" href="./feed.xml" title="RSS 피드" aria-label="RSS">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
      </a>
      <button class="header-btn" id="themeToggle" aria-label="테마 전환" title="테마 전환">
        <span id="themeIcon">🌓</span>
      </button>
    </div>
  </div>
</header>

<nav class="tabs" role="tablist">
  <div class="tabs-inner">
    <button class="tab" role="tab" data-period="today" aria-selected="true">Today <span class="count" id="cnt-today">0</span></button>
    <button class="tab" role="tab" data-period="week" aria-selected="false">This Week <span class="count" id="cnt-week">0</span></button>
    <button class="tab" role="tab" data-period="weekly" aria-selected="false">Weekly Report</button>
    <button class="tab" role="tab" data-period="monthly" aria-selected="false">Monthly Insight</button>
    <button class="tab" role="tab" data-period="archive" aria-selected="false">Archive</button>
  </div>
</nav>

<main id="app">
  <section class="empty">
    <h2>Loading today's updates…</h2>
  </section>
</main>

<footer>
  <p>Data collected from official RSS feeds · Translated by Claude · Updated daily 08:00 KST</p>
</footer>

<script>
// ────────────────────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────────────────────
const state = {
  period: 'today',
  category: 'all',
  tag: 'all',
  latest: null,     // { today, items, count, generated_at }
  weekly: null,     // latest weekly report
  monthly: null,    // latest monthly insight
  archiveDaily: []  // all daily files list
};

const CATEGORY_LABELS = {
  image_video: 'AI 이미지·영상',
  design_tool: '디자인 툴',
  ai_platform: 'AI 플랫폼',
  video_motion: '영상·모션',
  audio: '오디오·음성',
  misc: '기타'
};

const CATEGORY_COLORS = {
  image_video: '#d94a2b',
  design_tool: '#5145e5',
  ai_platform: '#0a8a5c',
  video_motion: '#c77700',
  audio: '#1d73c9',
  misc: '#6b655c'
};

const TAG_LABELS = {
  model_release: '모델출시',
  api_change: 'API변경',
  feature_add: '기능추가',
  price_change: '가격변경',
  tool_launch: '도구출시',
  integration: '연동지원'
};

// ────────────────────────────────────────────────────────────────
// Theme
// ────────────────────────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('theme');
  const initial = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', initial);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
}

// ────────────────────────────────────────────────────────────────
// Data loading
// ────────────────────────────────────────────────────────────────
async function loadLatest() {
  try {
    const res = await fetch('./data/latest.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(res.status);
    state.latest = await res.json();
  } catch (e) {
    console.warn('latest.json 로드 실패', e);
    state.latest = { today: todayISO(), items: [], count: 0, generated_at: null };
  }
}

async function loadWeekly() {
  if (state.weekly !== null) return;
  // 최신 주간 파일을 추정: data/weekly/ 디렉토리 인덱스가 없으므로
  // daily 들을 이용해 직접 이번 주 카드를 조합할 수도 있음. 여기서는
  // GitHub Actions가 생성해 두는 weekly/latest.json 을 우선 시도하고
  // 없으면 latest.json + 지난 6일 daily를 조합해 즉석 리포트 표시.
  try {
    const res = await fetch('./data/weekly/latest.json', { cache: 'no-cache' });
    if (res.ok) { state.weekly = await res.json(); return; }
  } catch {}
  // 폴백: daily 기반 즉석 집계
  state.weekly = await buildThisWeekFallback();
}

async function loadMonthly() {
  if (state.monthly !== null) return;
  try {
    const res = await fetch('./data/monthly/latest.json', { cache: 'no-cache' });
    if (res.ok) { state.monthly = await res.json(); return; }
  } catch {}
  state.monthly = null;
}

async function loadArchive() {
  // 브라우저는 디렉토리 목록을 못 읽으므로, 최근 30일을 순차 fetch
  if (state.archiveDaily.length > 0) return;
  const now = new Date();
  const found = [];
  for (let i = 1; i <= 30; i++) {
    const d = new Date(now); d.setUTCDate(d.getUTCDate() - i);
    const key = d.toISOString().slice(0, 10);
    try {
      const res = await fetch(`./data/daily/${key}.json`, { cache: 'force-cache' });
      if (res.ok) {
        const items = await res.json();
        found.push({ date: key, items });
      }
    } catch {}
  }
  state.archiveDaily = found;
}

async function buildThisWeekFallback() {
  const now = new Date();
  const dow = now.getUTCDay(); // 일=0
  const offsetToMonday = (dow + 6) % 7;
  const monday = new Date(now); monday.setUTCDate(now.getUTCDate() - offsetToMonday);
  const items = [];
  for (let i = 0; i <= offsetToMonday + (dow === 0 ? 6 : 0); i++) {
    const d = new Date(monday); d.setUTCDate(monday.getUTCDate() + i);
    const key = d.toISOString().slice(0, 10);
    try {
      const res = await fetch(`./data/daily/${key}.json`, { cache: 'no-cache' });
      if (res.ok) items.push(...await res.json());
    } catch {}
  }
  // 중복 제거
  const seen = new Set(), uniq = [];
  for (const it of items) { if (seen.has(it.id)) continue; seen.add(it.id); uniq.push(it); }
  uniq.sort((a, b) => (b.published_at || '').localeCompare(a.published_at || ''));
  return { headline: '', insights: [], all_items: uniq, count: uniq.length, fallback: true };
}

// ────────────────────────────────────────────────────────────────
// Render
// ────────────────────────────────────────────────────────────────
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(iso) {
  try {
    const d = new Date(iso);
    return `${d.getUTCFullYear()}.${String(d.getUTCMonth()+1).padStart(2,'0')}.${String(d.getUTCDate()).padStart(2,'0')}`;
  } catch { return iso?.slice(0, 10) || ''; }
}

function renderFilters(items) {
  const cats = Array.from(new Set(items.map(i => i.category))).filter(Boolean);
  const tags = Array.from(new Set(items.map(i => i.tag).filter(Boolean)));

  const html = `
    <div class="filters">
      <button class="chip" data-filter="cat" data-val="all" aria-pressed="${state.category === 'all'}">전체</button>
      ${cats.map(c => `<button class="chip" data-filter="cat" data-val="${c}" aria-pressed="${state.category === c}">${CATEGORY_LABELS[c] || c}</button>`).join('')}
      ${tags.length ? '<span class="filter-sep"></span>' : ''}
      ${tags.map(t => `<button class="chip" data-filter="tag" data-val="${t}" aria-pressed="${state.tag === t}">${TAG_LABELS[t] || t}</button>`).join('')}
    </div>`;
  return html;
}

function applyFilters(items) {
  return items.filter(it => {
    if (state.category !== 'all' && it.category !== state.category) return false;
    if (state.tag !== 'all' && it.tag !== state.tag) return false;
    return true;
  });
}

function renderCard(it) {
  const tagHtml = it.tag ? `<span class="card-tag">${TAG_LABELS[it.tag] || it.tag}</span>` : '';
  const tipHtml = it.tip_ko ? `<div class="card-tip">💡 ${escapeHtml(it.tip_ko)}</div>` : '';
  return `
    <article class="card" data-cat="${it.category}">
      <div class="card-top">
        <span class="card-source"><span class="emoji">${it.emoji || '📌'}</span>${escapeHtml(it.source_name)}</span>
        ${tagHtml}
      </div>
      <h3><a href="${escapeAttr(it.link)}" target="_blank" rel="noopener">${escapeHtml(it.title_ko)}</a></h3>
      <p class="card-summary">${escapeHtml(it.summary_ko || '')}</p>
      <p class="card-orig">원제: ${escapeHtml(it.title_en)}</p>
      ${tipHtml}
      <div class="card-bottom">
        <span>${fmtDate(it.published_at)}</span>
        <a href="${escapeAttr(it.link)}" target="_blank" rel="noopener">원문 ↗</a>
      </div>
    </article>`;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function escapeAttr(s) { return escapeHtml(s); }

function renderToday() {
  const items = state.latest?.items || [];
  const todayItems = items.filter(it => (it.published_at || '').slice(0, 10) === (state.latest?.today || todayISO()));
  const filtered = applyFilters(todayItems);

  const headline = buildTodayHeadline(todayItems);

  const app = document.getElementById('app');
  if (todayItems.length === 0) {
    app.innerHTML = `
      <section class="empty">
        <h2>오늘은 아직 새 업데이트가 수집되지 않았어요.</h2>
        <p>매일 오전 8시(KST)에 새로 수집됩니다. This Week 탭에서 이번 주 기록을 확인해보세요.</p>
      </section>`;
    return;
  }
  app.innerHTML = `
    <section class="headline">
      <div class="headline-eyebrow">LIVE · ${fmtDate(state.latest?.today || todayISO())} · ${todayItems.length}건</div>
      <h2 class="headline-title">${escapeHtml(headline.title)}</h2>
      ${headline.bullets.length ? `<ul class="insight-list">${headline.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>` : ''}
    </section>
    ${renderFilters(todayItems)}
    <div class="cards">
      ${filtered.map(renderCard).join('')}
    </div>`;
}

function buildTodayHeadline(items) {
  if (items.length === 0) return { title: '', bullets: [] };
  // LLM이 미리 써둔 headline이 payload에 있으면 그걸 우선 사용
  if (state.latest?.headline) {
    return { title: state.latest.headline, bullets: state.latest.insights || [] };
  }
  // 없으면 클라이언트에서 간단 조합
  const byCat = {};
  items.forEach(it => { (byCat[it.category] = byCat[it.category] || []).push(it); });
  const topCats = Object.entries(byCat).sort((a, b) => b[1].length - a[1].length).slice(0, 3);
  const title = `오늘 ${items.length}건 · ${topCats.map(([c]) => CATEGORY_LABELS[c] || c).join(' · ')} 중심으로 업데이트`;
  const bullets = items.slice(0, 5).map(it => `[${it.source_name}] ${it.summary_ko}`);
  return { title, bullets };
}

function renderThisWeek() {
  const items = state.weekly?.all_items || [];
  const filtered = applyFilters(items);
  const hl = state.weekly?.headline;

  const app = document.getElementById('app');
  if (items.length === 0) {
    app.innerHTML = `<section class="empty"><h2>이번 주 기록이 아직 없습니다.</h2></section>`;
    return;
  }
  app.innerHTML = `
    ${hl ? `<section class="headline">
      <div class="headline-eyebrow">THIS WEEK · ${items.length}건</div>
      <h2 class="headline-title">${escapeHtml(hl)}</h2>
      ${(state.weekly.insights || []).length ? `<ul class="insight-list">${state.weekly.insights.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>` : ''}
    </section>` : ''}
    ${renderFilters(items)}
    <div class="cards">
      ${filtered.map(renderCard).join('')}
    </div>`;
}

function renderWeeklyReport() {
  const w = state.weekly;
  const app = document.getElementById('app');
  if (!w || !w.headline) {
    app.innerHTML = `<section class="empty"><h2>주간 리포트가 아직 생성되지 않았어요.</h2><p>매주 월요일 오전에 자동 생성됩니다.</p></section>`;
    return;
  }
  const catsHtml = Object.entries(w.by_category || {}).map(([cat, items]) => `
    <div class="report-section">
      <h3><span class="cat-dot" style="--d:${CATEGORY_COLORS[cat] || '#999'}"></span>${CATEGORY_LABELS[cat] || cat} · ${items.length}건</h3>
      <div class="cards" style="margin-top:12px">
        ${items.map(renderCard).join('')}
      </div>
    </div>`).join('');

  app.innerHTML = `
    <article class="report">
      <div class="report-meta">WEEKLY REPORT · ${w.period?.from} ~ ${w.period?.to} · ${w.week}</div>
      <h2 class="report-title">${escapeHtml(w.headline || '')}</h2>
      <div class="report-summary">
        <ul class="insight-list">${(w.insights || []).map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
      </div>
    </article>
    ${catsHtml}`;
}

function renderMonthly() {
  const m = state.monthly;
  const app = document.getElementById('app');
  if (!m) {
    app.innerHTML = `<section class="empty"><h2>월간 인사이트가 아직 생성되지 않았어요.</h2><p>매월 1일 아침에 자동 생성됩니다.</p></section>`;
    return;
  }
  const hlCats = Object.entries(m.by_category_highlights || {}).map(([cat, lines]) => `
    <div class="report-section">
      <h3><span class="cat-dot" style="--d:${CATEGORY_COLORS[cat] || '#999'}"></span>${CATEGORY_LABELS[cat] || cat}</h3>
      <ul class="insight-list">${(lines || []).map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
    </div>`).join('');

  app.innerHTML = `
    <article class="report">
      <div class="report-meta">MONTHLY INSIGHT · ${m.period?.from} ~ ${m.period?.to} · ${m.month}</div>
      <h2 class="report-title">${escapeHtml(m.theme || '')}</h2>
      <p class="report-summary">${escapeHtml(m.summary || '')}</p>
      <div class="report-section">
        <h3>핵심 흐름</h3>
        <ul class="insight-list">${(m.top_insights || []).map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
      </div>
      ${hlCats}
    </article>`;
}

function renderArchive() {
  const app = document.getElementById('app');
  if (state.archiveDaily.length === 0) {
    app.innerHTML = `<section class="empty"><h2>아카이브가 비어 있습니다.</h2></section>`;
    return;
  }
  app.innerHTML = state.archiveDaily.map(({ date, items }) => `
    <div class="report-section">
      <h3>${fmtDate(date)} · ${items.length}건</h3>
      <div class="cards">${items.map(renderCard).join('')}</div>
    </div>`).join('');
}

// ────────────────────────────────────────────────────────────────
// Event wiring
// ────────────────────────────────────────────────────────────────
async function switchTab(period) {
  state.period = period;
  state.category = 'all'; state.tag = 'all';
  document.querySelectorAll('.tab').forEach(t =>
    t.setAttribute('aria-selected', t.dataset.period === period ? 'true' : 'false')
  );

  if (period === 'today') renderToday();
  else if (period === 'week') { await loadWeekly(); renderThisWeek(); }
  else if (period === 'weekly') { await loadWeekly(); renderWeeklyReport(); }
  else if (period === 'monthly') { await loadMonthly(); renderMonthly(); }
  else if (period === 'archive') { await loadArchive(); renderArchive(); }
}

function onFilterClick(e) {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const { filter, val } = chip.dataset;
  if (filter === 'cat') state.category = val;
  else if (filter === 'tag') state.tag = val;
  // 다시 렌더
  if (state.period === 'today') renderToday();
  else if (state.period === 'week') renderThisWeek();
}

// ────────────────────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────────────────────
async function boot() {
  initTheme();
  await loadLatest();

  // 카운트 업데이트
  const todayItems = (state.latest?.items || []).filter(
    it => (it.published_at || '').slice(0, 10) === (state.latest?.today || todayISO())
  );
  document.getElementById('cnt-today').textContent = todayItems.length;

  // 이번 주 카운트는 lazy load
  loadWeekly().then(() => {
    document.getElementById('cnt-week').textContent = state.weekly?.all_items?.length ?? 0;
  });

  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => switchTab(t.dataset.period))
  );
  document.addEventListener('click', onFilterClick);

  renderToday();
}

boot();
</script>
</body>
</html>
