name: Weekly Report

on:
  schedule:
    # 매주 월요일 한국시간 오전 9시 (UTC 일요일 00:00)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Build weekly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL_WEEKLY: ${{ vars.MODEL_WEEKLY || 'claude-sonnet-4-6' }}
        run: python scripts/build_weekly.py

      - name: Commit
        run: |
          git config user.name "trend-bot"
          git config user.email "trend-bot@users.noreply.github.com"
          git add data/weekly/
          git diff --staged --quiet || git commit -m "data: weekly report"
          git push || true
